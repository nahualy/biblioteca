<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Biblioteca</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="icon" type="image/svg+xml" href="favicon.svgr" />
  </head>

  <body>
    <div class="container mt-5">
      <h1 class="text-center mb-4">Biblioteca Digital</h1>

      <div class="card shadow">
        <div class="card-header">Búsqueda de Libros</div>

        <div class="card-body">
          <div class="row g-3">
            <div class="col-md-3">
              <input
                type="text"
                id="isbn"
                class="form-control"
                placeholder="ISBN"
              />
            </div>

            <div class="col-md-3">
              <input
                type="text"
                id="nombre"
                class="form-control"
                placeholder="Nombre"
              />
            </div>

            <div class="col-md-3">
              <input
                type="text"
                id="autor"
                class="form-control"
                placeholder="Autor"
              />
            </div>

            <div class="col-md-3">
              <select id="categoria" class="form-select">
                <option value="">Todas</option>
                <option value="Programación">Programación</option>
                <option value="Literatura">Literatura</option>
                <option value="Humor">Humor</option>
                <option value="Misterio">Misterio</option>
                <option value="Historia">Historia</option>
                <option value="Teatro">Teatro</option>
              </select>
            </div>
          </div>

          <div class="mt-4">
            <button id="btnBuscar" class="btn btn-primary">Buscar</button>

            <button id="btnLimpiar" class="btn btn-secondary">Limpiar</button>
          </div>
        </div>
      </div>

      <div class="table-responsive mt-4">
        <table class="table table-bordered table-striped">
          <thead class="table-dark">
            <tr>
              <th>ISBN</th>
              <th>Nombre</th>
              <th>Autor</th>
              <th>Edición</th>
              <th>Categoría</th>
            </tr>
          </thead>

          <tbody id="tablaLibros"></tbody>
        </table>
      </div>
    </div>

    <script type="module" src="./js/app.js"></script>
  </body>
</html>
